  <text x="182" y="304" text-anchor="middle" font-size="9" font-weight="bold" fill="white">R</text>
  <text x="182" y="316" text-anchor="middle" font-size="9" font-weight="bold" fill="white">E</text>
  <text x="182" y="328" text-anchor="middle" font-size="9" font-weight="bold" fill="white">W</text>
